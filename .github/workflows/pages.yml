name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "app/static/**"
      - "deploy/build_pages_site.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages site from app/static
        run: ./deploy/build_pages_site.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.pages_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
